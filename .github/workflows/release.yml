name: Release Workflow
on:
  push:
    # Runs on pushing a tag iff the tag has the following format
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override"
        required: true
        type: string

jobs:
  lint-versions:
    name: Get LLVM and SCIP versions and run linter
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.llvm-scip-versions.outputs.IMAGE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Compute Docker image name from LLVM and SCIP referenced versions
        id: llvm-scip-versions
        env:
          REGISTRY_NAME: "ghcr.io"
          IMAGE_BASE_NAME: "llvm-scip"
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY_NAME }}/${GITHUB_REPOSITORY_OWNER,,}/${{ github.event.repository.name }}-${{ env.IMAGE_BASE_NAME }}:$(cat .llvm_sha)-$(cat .scip_version)" >> $GITHUB_OUTPUT

      - name: Run clang-format check
        run: |
          chmod +x scripts/check-clang-format.sh 
          bash scripts/check-clang-format.sh

  build-and-test:
    name: Build artifacts for Python 3.10 and test
    needs: [lint-versions]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [python310, python311, python312]
    container:
      image: ${{ needs.lint-versions.outputs.image_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set build toolchain paths
        id: toolchain-paths
        shell: bash
        run: |
          echo "SCIP_DIR_IN_IMAGE=$(bash /toolchain/get_path.sh scip)" >> $GITHUB_ENV
          echo "MLIR_DIR_IN_IMAGE=$(bash /toolchain/get_path.sh mlir)" >> $GITHUB_ENV
          echo "VENV_DIR_IN_IMAGE=$(bash /toolchain/get_path.sh ${{ matrix.python-version }})" >> $GITHUB_ENV

      - name: Local version override
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=v${{ inputs.version_override }}" >> $GITHUB_ENV

      - name: Configure and compile python wheel
        env:
          COMPILER_BIN: "clang-21"
          LINKER_BIN: "ld.lld-21"
        shell: bash
        run: |
          source ${{ env.VENV_DIR_IN_IMAGE }}/bin/activate
          SKBUILD_CMAKE_ARGS="-DSCIP_DIR=${{ env.SCIP_DIR_IN_IMAGE }};-DMLIR_DIR=${{ env.MLIR_DIR_IN_IMAGE }};-DPython3_EXECUTABLE=${{ env.VENV_DIR_IN_IMAGE }}/bin/python;-DCMAKE_C_COMPILER=${{ env.COMPILER_BIN }};-DCMAKE_CXX_COMPILER=${{ env.COMPILER_BIN }};-DCMAKE_LINKER=${{ env.LINKER_BIN }}" \
          SETUPTOOLS_SCM_OVERRIDES_FOR_QOALA_MLIR='{local_scheme = "no-local-version"}' \
            python -m build --wheel

      - name: Test binary artifacts
        run: |
          export PATH=${{ env.MLIR_DIR_IN_IMAGE }}:/workspace/py-build/bin:$PATH
          llvm-lit test/

      - name: Prepare artifacts
        # We tar the artifacts, so they preseve the execution permission when expanding
        run: |
          mkdir -p /workspace/artifacts
          cd /workspace/artifacts
          cp /workspace/dist/*.whl .
          cp /workspace/py-build/bin/qoala-* .
          tar cvfz qoala-mlir-artifacts-${{ matrix.python-version }}.tgz *.whl qoala-*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          path: /workspace/artifacts/qoala-mlir-artifacts-${{ matrix.python-version }}.tgz
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [ lint-versions, build-and-test ]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/qoala-mlir
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: qoala-mlir-artifacts-*
          merge-multiple: true

      - name: Create Linux binaries tag and prepare python wheels
        id: rename-artifact
        env:
          BINARIES_BASE_PKG_NAME: "qoala-mlir"
          BINARIES_ARCH: "linux-x86_64"
        run: |
          cd artifacts
          tar cvfz ${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz
          echo "ARTIFACT_NAME=${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz" >> $GITHUB_OUTPUT
          mkdir -p $GITHUB_WORKSPACE/dist
          cp *.whl $GITHUB_WORKSPACE/dist

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.whl
            artifacts/${{ steps.rename-artifact.outputs.ARTIFACT_NAME }}

      - name: Upload python wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14

  release-test:
    name: Publish Release
    needs: [ lint-versions, build-and-test ]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/simulaqron
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: qoala-mlir-artifacts-*
          merge-multiple: true

      - name: Create Linux binaries tag and prepare python wheels
        id: rename-artifact
        env:
          BINARIES_BASE_PKG_NAME: "qoala-mlir"
          BINARIES_ARCH: "linux-x86_64"
        run: |
          cd artifacts
          tar cvfz ${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz
          echo "ARTIFACT_NAME=${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz" >> $GITHUB_OUTPUT
          mkdir -p $GITHUB_WORKSPACE/dist
          cp *.whl $GITHUB_WORKSPACE/dist

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.whl
            artifacts/${{ steps.rename-artifact.outputs.ARTIFACT_NAME }}

      - name: Upload python wheels to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          repository_url: https://test.pypi.org/legacy/

