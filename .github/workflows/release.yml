name: Release Workflow
on:
  push:
    # Runs on pushing a tag iff the tag has the following format
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override"
        required: true
        type: string

env:
  REGISTRY_NAME: "ghcr.io"
  IMAGE_BASE_NAME: "llvm-scip"
  COMPILER_BIN: "clang-21"
  LINKER_BIN: "ld.lld-21"
  BINARIES_BASE_PKG_NAME: "qoala-mlir"
  BINARIES_ARCH: "linux-x86_64"

jobs:
  lint-versions:
    name: Get LLVM and SCIP versions and run linter
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.llvm-scip-versions.outputs.GHCR_REGISTRY }}
      image_base_name: $ {{ steps.llvm-scip-versions.outputs.IMG_BASE_NAME }}
      llvm_sha: ${{ steps.llvm-scip-versions.outputs.LLVM_SHA }}
      scip_version: ${{ steps.llvm-scip-versions.outputs.SCIP_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Retrieve LLVM and SCIP referenced versions
        id: llvm-scip-versions
        run: |
          echo "LLVM_SHA=$(cat .llvm_sha)" >> $GITHUB_OUTPUT
          echo "SCIP_VERSION=$(cat .scip_version)" >> $GITHUB_OUTPUT
          echo "GHCR_REGISTRY=$${{ env.REGISTRY_NAME }}" >> $GITHUB_OUTPUT
          echo "IMG_BASE_NAME=$${{ env.IMAGE_BASE_NAME }}" >> $GITHUB_OUTPUT

      - name: Run clang-format check
        run: |
          chmod +x scripts/check-clang-format.sh 
          bash scripts/check-clang-format.sh

  build-and-test:
    name: Build artifacts for Python 3.10 and test
    needs: [lint-versions]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [python310, python311, python312]
    container:
      image: ${{ needs.lint-versions.outputs.registry }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ needs.lint-versions.outputs.image_base_name }}:${{ needs.lint-versions.outputs.llvm_sha }}-${{ needs.lint-versions.outputs.llvm-scip-versions.outputs.scip_version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set build toolchain paths
        id: toolchain-paths
        run: |
          bash /toolchain/get_path.sh scip > $GITHUB_OUTPUT
          bash /toolchain/get_path.sh mlir > $GITHUB_OUTPUT
          bash /toolchain/get_path.sh ${{ matrix.python-version }} > $GITHUB_OUTPUT

      - name: Local version override
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v$${{ inputs.version_override }}

      - name: Configure and compile python wheel
        run: |
          SKBUILD_CMAKE_ARGS="-DSCIP_DIR=${{ steps.toolchain-paths.outputs.SCIP_DIR_IN_IMAGE }};-DMLIR_DIR=${{ steps.toolchain-paths.outputs.MLIR_DIR_IN_IMAGE }};-DPython3_EXECUTABLE=${{ steps.toolchain-paths.outputs.VENV_DIR_IN_IMAGE }}/bin/python;-DCMAKE_C_COMPILER=${{ env.COMPILER_BIN }};-DCMAKE_CXX_COMPILER=${{ env.COMPILER_BIN }};-DCMAKE_LINKER=${{ env.LINKER_BIN }}" \
          SETUPTOOLS_SCM_OVERRIDES_FOR_QOALA_MLIR='{local_scheme = "no-local-version"}' \
            python -m build --wheel

      - name: Test binary artifacts
        run: |
          export PATH=${{ steps.toolchain-paths.outputs.MLIR_DIR_IN_IMAGE }}:/workspace/py-build/bin:$PATH
          llvm-lit test/

      - name: Prepare artifacts
        # We tar the artifacts, so they preseve the execution permission when expanding
        run: |
          mkdir -p /workspace/artifacts
          cd /workspace/artifacts
          cp /workspace/dist/*.whl .
          cp /workspace/py-build/bin/qoala-* .
          tar cvfz qoala-mlir-artifacts-${{ matrix.python-version }}.tgz *.whl qoala-*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          path: /workspace/artifacts/qoala-mlir-artifacts-${{ matrix.python-version }}.tgz
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [ lint-versions, build-and-test ]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/qoala-mlir
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: qoala-mlir-artifacts-*
          merge-multiple: true

      - name: Create Linux binaries tag and prepare python wheels
        id: rename-artifact
        run: |
          cd artifacts
          tar cvfz ${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz
          echo "ARTIFACT_NAME=${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz" >> $GITHUB_OUTPUT
          mkdir -p $GITHUB_WORKSPACE/dist
          cp *.whl $GITHUB_WORKSPACE/dist

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.whl
            artifacts/${{ steps.rename-artifact.outputs.ARTIFACT_NAME }}

      - name: Upload python wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14

  release-test:
    name: Publish Release
    needs: [ lint-versions, build-and-test ]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/simulaqron
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: qoala-mlir-artifacts-*
          merge-multiple: true

      - name: Create Linux binaries tag and prepare python wheels
        id: rename-artifact
        run: |
          cd artifacts
          tar cvfz ${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz
          echo "ARTIFACT_NAME=${{ env.BINARIES_BASE_PKG_NAME}}-${{ github.ref_name }}-${{ env.BINARIES_ARCH }}.tar.gz" >> $GITHUB_OUTPUT
          mkdir -p $GITHUB_WORKSPACE/dist
          cp *.whl $GITHUB_WORKSPACE/dist

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.whl
            artifacts/${{ steps.rename-artifact.outputs.ARTIFACT_NAME }}

      - name: Upload python wheels to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          repository_url: https://test.pypi.org/legacy/

