<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="sans-serif">
  <rect x="0" y="0" width="800" height="320" fill="#fafafa" stroke="#888" stroke-width="2" stroke-dasharray="6,6"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold">PLACEHOLDER — backend-overview.svg</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#444">qoala-mlir docs · Architecture / Overview</text>
  <foreignObject x="40" y="90" width="720" height="210">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: sans-serif; font-size: 14px; color:#222; line-height:1.5;">
      <strong>What this figure should depict:</strong>
      <p>Detailed view of the qoala-opt + qoala-translate pipeline only. Three vertical columns labeled HIR / MIR / LIR. Inside each column list the major passes that run while the program is at that level:</p>
      <ul>
        <li><strong>HIR:</strong> <code>qnet-peephole-optimizations</code>, <code>qnet-dead-code-elimination</code>, <code>qnet-check-linear</code>, <code>qnet-show-analysis-gate-count</code>.</li>
        <li><strong>MIR:</strong> <code>lower-float-rotations</code>, <code>unfold-comm-ops</code>, <code>functionize</code>, <code>fold-constants</code>, <code>insert-convert-float-angle</code>.</li>
        <li><strong>LIR:</strong> <code>qoalahost-add-block-precedences</code>, <code>qoalahost-reorder-blocks</code>, <code>qoalahost-show-analysis-*</code>.</li>
      </ul>
      <p>Inter-column arrows labeled with the conversion passes (<code>lower-qoala-hir-to-mir</code>, <code>lower-qoala-mir-to-lir</code>). Final arrow into a <em>qoala-translate</em> box producing <em>.iqoala</em>.</p>
    </div>
  </foreignObject>
</svg>
